name: Nightly Evolution

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC nightly
  workflow_dispatch:        # manual trigger button

# Needs write access to push merged mutations back to the GitHub repo.
permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Kill switch
        run: |
          if [ -f EVOLUTION_PAUSED ]; then
            echo "Evolution paused by kill-switch file. Exiting cleanly."
            exit 0
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Baseline - frozen suite must pass before evolving
        run: |
          pytest tests/ -q
          for f in dataset_embed.js app_v30.js globe_patch.js mapping_canvas.js; do
            node --check "static/$f"
          done

      - name: Propose mutation (one diff)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python evolution/evolve.py

      - name: Guard - frozen files untouched
        run: |
          if ! git diff --quiet -- tests/ .github/ requirements.txt requirements-dev.txt Dockerfile; then
            echo "VIOLATION: mutation touched frozen files. Reverting."
            git checkout -- tests/ .github/ requirements.txt requirements-dev.txt Dockerfile
            exit 1
          fi

      - name: Validate mutation
        id: validate
        continue-on-error: true
        run: |
          pytest tests/ -q
          for f in dataset_embed.js app_v30.js globe_patch.js mapping_canvas.js; do
            node --check "static/$f"
          done

      - name: Merge or revert
        run: |
          git config user.name "evolution-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ "${{ steps.validate.outcome }}" = "success" ]; then
            echo "$(date -u --iso-8601=seconds) | MERGED | tests passed" >> evolution/attempts.log
            git add main.py static/ evolution/attempts.log
            git commit -m "evolve: mutation accepted $(date -u +%F)"
          else
            git checkout -- main.py static/
            echo "$(date -u --iso-8601=seconds) | REVERTED | tests failed" >> evolution/attempts.log
            git add evolution/attempts.log
            git commit -m "evolve: mutation reverted $(date -u +%F)"
          fi
          git push origin HEAD:main

      - name: Deploy to HuggingFace Space (live) on accepted mutation
        if: steps.validate.outcome == 'success'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push "https://colesr:${HF_TOKEN}@huggingface.co/spaces/colesr/insight-engine-docker" HEAD:main
